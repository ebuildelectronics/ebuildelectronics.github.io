<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart | e-Build Electronics</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">e-Build Electronics</a>
    <button id="menuBtn" class="menu">Menu</button>
    <nav id="nav">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="cart.html">Cart <span id="cartCount">0</span></a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="page-head">
      <h1>Your Cart</h1>
      <p>Review your selected products before submitting your order.</p>
    </section>

    <section class="cart-layout">
      <div id="cartItems" class="cart-items"></div>

      <aside class="cart-summary">
        <h2>Order Summary</h2>
        <div class="summary-line">
          <span>Total Items</span>
          <strong id="summaryItems">0</strong>
        </div>
        <div class="summary-line">
          <span>Estimated Total</span>
          <strong id="summaryTotal">₱0</strong>
        </div>

        <p class="muted order-note">
          Submit your order and our team will review your request and reply as soon as possible.
        </p>

        <form id="orderSubmitForm" method="POST" class="order-form">
          <input type="hidden" name="_cc" id="formCc" value="official.recortech@gmail.com" />
          <input type="hidden" name="_subject" id="formSubject" value="New Order Request - EBuild Electronics" />
          <input type="hidden" name="_template" value="table" />
          <input type="hidden" name="_captcha" value="true" />
          <input type="hidden" name="Total Items" id="formTotalItems" />
          <input type="hidden" name="Estimated Total" id="formEstimatedTotal" />
          <input type="hidden" name="Order Summary" id="formOrderDetails" />

          <div class="customer-fields">
            <label>Name<input type="text" id="customerName" name="Customer Name" autocomplete="name" required /></label>
            <label>Contact Number<input type="tel" id="customerContact" name="Contact Number" autocomplete="tel" required /></label>
            <label>Email<input type="email" id="customerEmail" name="Customer Email" autocomplete="email" required /></label>
          </div>

          <textarea id="orderSummaryText" name="Order Details" aria-label="Order details" rows="9"></textarea>

          <div class="actions cart-summary-actions">
            <button type="submit" id="submitOrderBtn" class="btn primary">Submit Your Order</button>
            <a class="btn" href="contact.html">Contact Us</a>
            <button type="button" id="clearCartBtn" class="btn danger">Clear Cart</button>
          </div>
        </form>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
